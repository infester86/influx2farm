name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (electron-vite)
        run: npm run build:app

      - name: Build portable Windows EXE
        run: npx electron-builder --win portable --publish never

      - name: Show release directory
        shell: pwsh
        run: Get-ChildItem -Recurse release | Select-Object FullName, Length

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: influx2farm-windows-release
          path: |
            release/**/*.exe
          if-no-files-found: error
          retention-days: 14
